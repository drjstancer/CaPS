<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BtG Portal</title>
  <style>
    :root { --mizzou-gold:#FDB719; --tiger-black:#000; --black-tint:#333; --white:#fff; --max-width:1100px; --shadow:0 12px 30px rgba(0,0,0,.14); --radius:18px; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--tiger-black);background:linear-gradient(135deg,rgba(253,183,25,.16),rgba(255,255,255,.92)),linear-gradient(180deg,#fff 0%,#fff9ed 100%);min-height:100vh}
    .topbar{height:12px;background:var(--mizzou-gold)}
    .hero{background:var(--tiger-black);color:var(--white);padding:4.5rem 1.5rem 3rem}
    .container{width:min(100%,var(--max-width));margin:0 auto}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;margin-top:-2rem}
    .nav-card{background:#fff;border:2px solid rgba(0,0,0,.06);border-top:6px solid var(--mizzou-gold);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem}
    .nav-card a{display:inline-block;text-decoration:none;background:#000;color:#fff;padding:.8rem 1.1rem;border-radius:999px;font-weight:700}
    .back-link{display:inline-block;margin-top:2rem;font-weight:700;text-decoration:none;color:#000}
    .back-link:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="topbar"></div>
  <header class="hero"><div class="container"><h1>Bridge the Gap</h1></div></header>
  <main>
    <div class="container">
      <section class="card-grid">
        <article class="nav-card"><h2>BtG EHR</h2><a href="/btg-ehr/">Launch Simulation</a></article>
        <article class="nav-card"><h2>BtG Quiz Bowl</h2><a href="#">Coming Soon</a></article>
        <article class="nav-card"><h2>Lung Sounds</h2><a href="#">Coming Soon</a></article>
      </section>
      <a href="/" class="back-link">← Back to CaPS Applications</a>
    </div>
  </main>
</body>
</html>
